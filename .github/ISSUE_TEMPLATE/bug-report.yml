name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce
      placeholder: |
        ```ts
        // your code
        ```
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of @orkestrate/sdk are you using?
    validations:
      required: true
